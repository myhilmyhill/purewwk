services:
  purewwk:
    image: purewwk:latest
    build: .
    ports:
      - 8080:8080
    volumes:
      - ./Purewwk/appsettings.Development.json:/app/appsettings.Development.json
      - ./Purewwk/appsettings.json:/app/appsettings.json
      - ./Music:/app/Music
      - music_index_vol:/app/music_index
      - hls_segments_vol:/app/hls_segments
      # - ./FluidR3_GM.sf2:/usr/share/sounds/sf2/FluidR3_GM.sf2

volumes:
  music_index_vol:
  hls_segments_vol:
